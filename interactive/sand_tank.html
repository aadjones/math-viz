<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sand Tank</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F0E8; display: flex; justify-content: center; padding: 20px; }
  </style>
</head>
<body>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// LAYOUT
// ═══════════════════════════════════════════════════════════════════════════
const W = 500, H = 660;

const TL = 150, TT = 90, TW = 200, TH = 320;
const TR  = TL + TW;
const TB  = TT + TH;
const TCX = TL + TW / 2;

// Faucet pours in at FX (inside tank, right-ish)
const FX          = TL + TW * 0.68;
const PIPE_ELBOW_Y = TT - 32;  // y where vertical meets horizontal
const PIPE_RIGHT_X = TR + 55;  // how far the horizontal pipe extends

// Drain gap at bottom center — driven by drain scrubby, modulated by level in non-fixed modes
const DGAP_MIN = 4, DGAP_MAX = 48;
const FRAMES_PER_MONTH = 8;  // sim speed — 8 frames = 1 month (~7.5 months/sec)
// Unified rate range — both faucet and drain use same scale so equal values = equilibrium
const K_RATE_MIN = 0.01, K_RATE_MAX = 0.15;
const K_OUT_MIN = K_RATE_MIN, K_OUT_MAX = K_RATE_MAX;
function dgap() {
  const baseGap = DGAP_MIN + ((sim.kOut - K_OUT_MIN) / (K_OUT_MAX - K_OUT_MIN)) * (DGAP_MAX - DGAP_MIN);
  // Only modulate aperture once the sim is running — config state always shows the set value
  if (!sim.running) return baseGap;
  if (sim.mode === 'fixed') return baseGap;
  if (sim.mode === 'proportional') {
    return DGAP_MIN + (baseGap - DGAP_MIN) * sim.level;
  }
  // floor mode: proportional but never below the floor's fraction of drain rate
  const floorFrac = Math.min(1, sim.kFloor / sim.kOut);
  const minGap    = DGAP_MIN + (baseGap - DGAP_MIN) * floorFrac;
  return Math.max(DGAP_MIN + (baseGap - DGAP_MIN) * sim.level, minGap);
}

// ═══════════════════════════════════════════════════════════════════════════
// COLORS
// ═══════════════════════════════════════════════════════════════════════════
const BG     = '#F5F0E8';
const INK    = '#1A1A1A';
const C_BASE = '#C9A84C';  // warm gold — original sand
const C_INT  = '#8B2020';  // deep red  — interest sand
const C_WALL = '#7A6E60';  // warm gray — tank walls & pipes
const C_EMPTY= '#DDD5C8';  // slightly tinted empty tank
const C_DIM  = '#B8B0A8';  // dimmed — locked controls

// ═══════════════════════════════════════════════════════════════════════════
// SIMULATION
// ═══════════════════════════════════════════════════════════════════════════
let sim;

function makeSim() {
  return {
    level:        0.80,
    baseSand:     0.80,
    interestSand: 0.00,
    initialBase:  0.80,
    totalIn:      0,
    faucetMode:   'constant',      // 'proportional' | 'constant'
    mode:         'fixed',         // 'fixed' | 'proportional' | 'floor'
    kIn:          0.05,            // faucet rate coefficient
    kOut:         0.08,            // drain rate coefficient
    kFloor:       0.025,     // minimum drain rate (floor mode only)
    running:      false,
    done:         false,
    overflowed:   false,
    started:      false,   // true once Start is clicked (distinguishes idle from paused)
    months:       0,
    frameAccum:   0,       // sub-month frame counter
  };
}

function stepSim() {
  const dt = 1 / 60;
  sim.frameAccum++;
  if (sim.frameAccum >= FRAMES_PER_MONTH) {
    sim.months++;
    sim.frameAccum = 0;
  }

  const inRate = sim.faucetMode === 'constant' ? sim.kIn : sim.kIn * sim.level;

  let outRate;
  if      (sim.mode === 'fixed')        outRate = sim.kOut;
  else if (sim.mode === 'proportional') outRate = sim.kOut * sim.level;
  else                                  outRate = Math.max(sim.kOut * sim.level, sim.kFloor);

  const dIn  = inRate  * dt;
  const dOut = Math.min(outRate * dt, sim.level);

  // Interest sand arrives on top
  sim.interestSand += dIn;
  sim.totalIn      += dIn;

  // Drain from bottom: base sand drains first, then interest
  let toDrain       = dOut;
  const fromBase    = Math.min(toDrain, sim.baseSand);
  sim.baseSand     -= fromBase;
  toDrain          -= fromBase;
  sim.interestSand  = Math.max(0, sim.interestSand - toDrain);

  sim.level = sim.baseSand + sim.interestSand;

  if (sim.level <= 0.002) {
    sim.level = sim.baseSand = sim.interestSand = 0;
    sim.running = false;
    sim.done    = true;
  }

  if (sim.level >= 1.0) {
    sim.level = 1.0;
    sim.running    = false;
    sim.overflowed = true;
    sim.done       = true;
  }

  spawnFaucet(inRate);
  spawnDrain(outRate);
}

// ═══════════════════════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════════════════════
let fParts = [];  // faucet: red, fall into tank
let dParts = [];  // drain:  fall away below

function stepMonth() {
  for (let i = 0; i < FRAMES_PER_MONTH; i++) {
    if (!sim.done) { stepSim(); stepParticles(); }
  }
}

function spawnFaucet(rate) {
  const n = Math.floor(rate * 280 + random());
  for (let i = 0; i < n; i++) {
    fParts.push({
      x:  FX + random(-5, 5),
      y:  PIPE_ELBOW_Y + 6,
      vy: random(1.5, 3.5),
      r:  random(2.5, 4),
    });
  }
}

function spawnDrain(rate) {
  const n = Math.floor(rate * 220 + random());
  for (let i = 0; i < n; i++) {
    dParts.push({
      x:   TCX + random(-dgap() / 2, dgap() / 2),
      y:   TB + 3,
      vy:  random(2, 5),
      r:   random(2, 3.5),
      col: sim.baseSand > 0.001 ? C_BASE : C_INT,
    });
  }
}

function stepParticles() {
  const sandTopY = TB - sim.level * TH;

  // Faucet particles dissolve into sand when they reach the surface
  fParts = fParts.filter(p => {
    p.vy += 0.18;
    p.y  += p.vy;
    return p.y < sandTopY;
  });

  // Drain particles fall off screen
  dParts = dParts.filter(p => {
    p.vy += 0.22;
    p.y  += p.vy;
    return p.y < H + 20;
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// DRAWING — TANK
// ═══════════════════════════════════════════════════════════════════════════
function drawTank() {
  const sandTopY  = TB - sim.level    * TH;  // top of all sand
  const baseTopY  = TB - sim.baseSand * TH;  // top of base layer = bottom of interest

  // Empty interior
  fill(C_EMPTY); noStroke();
  rect(TL, TT, TW, TH);

  // Base sand (bottom)
  if (sim.baseSand > 0.001) {
    fill(C_BASE);
    rect(TL, baseTopY, TW, TB - baseTopY);
  }

  // Interest sand (top layer)
  if (sim.interestSand > 0.001) {
    fill(C_INT);
    rect(TL, sandTopY, TW, baseTopY - sandTopY);
  }

  // Walls — drawn over sand so edges are clean
  stroke(C_WALL); strokeWeight(3); noFill();
  line(TL, TT, TL, TB);                          // left
  line(TR, TT, TR, TB);                          // right
  line(TL, TB, TCX - dgap() / 2, TB);           // bottom-left segment
  line(TCX + dgap() / 2, TB, TR, TB);           // bottom-right segment
}

function faucetWeight() {
  const base = map(scrubbies.faucet.val, 1, 10, 2, 14);
  if (!sim.running || sim.faucetMode === 'constant') return base;
  return Math.max(base * sim.level, 0.5);
}

function faucetColor() {
  if (!sim.running || sim.faucetMode === 'constant') return color(C_WALL);
  return lerpColor(color(C_DIM), color(C_WALL), sim.level);
}

function drainWeight() {
  const base = map(scrubbies.drain.val, 1, 10, 2, 8);
  if (!sim.running) return base;
  if (sim.mode === 'fixed') return base;
  const floorFrac = (sim.mode === 'floor') ? Math.min(1, sim.kFloor / sim.kOut) : 0;
  return Math.max(base * Math.max(sim.level, floorFrac), 1);
}

function drawFaucetPipe() {
  const w   = faucetWeight();
  const col = faucetColor();
  stroke(col); strokeWeight(w);
  line(FX, PIPE_ELBOW_Y, FX, TT);
  line(FX, PIPE_ELBOW_Y, PIPE_RIGHT_X, PIPE_ELBOW_Y);

  // Spout cap scales with pipe weight
  fill(col); noStroke();
  rect(FX - w / 2 - 1, PIPE_ELBOW_Y, w + 2, w + 3, 2);
}

function atFloor() {
  return sim.mode === 'floor' && sim.kOut * sim.level <= sim.kFloor;
}

function drawDrainPipe() {
  const pipeCol = atFloor() ? C_INT : C_WALL;
  stroke(pipeCol); strokeWeight(drainWeight());
  line(TCX - dgap() / 2, TB, TCX - dgap() / 2, TB + 28);
  line(TCX + dgap() / 2, TB, TCX + dgap() / 2, TB + 28);
}

function drawParticles() {
  noStroke();
  fill(C_INT);
  for (const p of fParts) ellipse(p.x, p.y, p.r * 2);
  for (const p of dParts) { fill(p.col); ellipse(p.x, p.y, p.r * 2); }
}

// ═══════════════════════════════════════════════════════════════════════════
// DRAWING — CONTROLS
// ═══════════════════════════════════════════════════════════════════════════
// Scrubby number inputs — drag horizontally to change, 1-10 scale
// Both use the same rate range so equal values produce equilibrium in matching modes
const scrubbies = {
  faucet: { x: PIPE_RIGHT_X + 20, y: PIPE_ELBOW_Y,      val: 5, min: 1, max: 10, label: 'inflow start',  kMin: K_RATE_MIN, kMax: K_RATE_MAX },
  drain:  { x: TR + 22,           y: TB + 14,            val: 5, min: 1, max: 10, label: 'drain start', kMin: K_RATE_MIN, kMax: K_RATE_MAX },
};
let scrubbing = null, scrubStartX = 0, scrubStartVal = 0;

function scrubToK(s) { return map(s.val, s.min, s.max, s.kMin, s.kMax); }

function drawScrubby(s, locked) {
  const ink  = locked ? C_DIM : INK;
  const cfg  = !locked;
  const bw = 44, bh = 22;
  const bx = s.x - bw / 2, by = s.y - bh / 2;

  // Box
  stroke(ink); strokeWeight(1.2); fill(BG);
  rect(bx, by, bw, bh, 3);

  // Arrows hint (config only)
  fill(ink); noStroke();
  textFont('Courier New'); textSize(9); textAlign(CENTER, CENTER);
  if (cfg) {
    text('◀', bx + 7,      s.y);
    text('▶', bx + bw - 7, s.y);
  }

  // Value
  textSize(12); textAlign(CENTER, CENTER);
  text(s.val, s.x, s.y);

  // Label below
  textSize(9); textAlign(CENTER, TOP);
  text(s.label, s.x, by + bh + 3);

  // Store hit area
  s._x = bx; s._y = by; s._w = bw; s._h = bh;
}

const FAUCET_MODE_BTNS = [
  { id: 'constant',     label: 'fixed' },
  { id: 'proportional', label: 'prop.' },
];
const DRAIN_MODE_BTNS = [
  { id: 'fixed',        label: 'fixed' },
  { id: 'proportional', label: 'prop.' },
  { id: 'floor',        label: 'floor' },
];

function drawModeToggle(btns, activeId, cx, y, locked) {
  const bw = 46, bh = 18, gap = 4;
  const totalW = btns.length * bw + (btns.length - 1) * gap;
  let bx = cx - totalW / 2;
  const ink = locked ? C_DIM : INK;
  for (const btn of btns) {
    const on = activeId === btn.id;
    stroke(ink); strokeWeight(1);
    fill(on ? ink : BG);
    rect(bx, y, bw, bh, 2);
    noStroke(); fill(on ? BG : ink);
    textFont('Courier New'); textAlign(CENTER, CENTER); textSize(9);
    text(btn.label, bx + bw / 2, y + bh / 2);
    btn._x = bx; btn._y = y; btn._w = bw; btn._h = bh;
    bx += bw + gap;
  }
}

function drawScrubbies() {
  const locked = !configActive();
  drawScrubby(scrubbies.faucet, locked);
  drawModeToggle(FAUCET_MODE_BTNS, sim.faucetMode, scrubbies.faucet.x, PIPE_ELBOW_Y + 26, locked);
  drawScrubby(scrubbies.drain, locked);
  drawModeToggle(DRAIN_MODE_BTNS, sim.mode, scrubbies.drain.x, TB + 38, locked);
}

let startBtn = {}, pauseBtn = {}, resumeBtn = {}, stepBtn = {}, resetBtn = {};

function drawBtn(label, x, y, w, h) {
  stroke(INK); strokeWeight(1.5); fill(BG);
  rect(x, y, w, h, 3);
  noStroke(); fill(INK);
  textFont('Courier New'); textAlign(CENTER, CENTER); textSize(11);
  text(label, x + w / 2, y + h / 2);
  return { _x: x, _y: y, _w: w, _h: h };
}

function drawControls() {
  const bw = 65, bh = 26, gap = 10;
  const ay = TB + 100;

  // Clear all buttons each frame
  startBtn = {}; pauseBtn = {}; resumeBtn = {}; stepBtn = {};

  if (configActive()) {
    // Idle: [start] [reset]
    const ox = TCX - bw - gap / 2;
    startBtn = drawBtn('start',  ox,          ay, bw, bh);
    resetBtn  = drawBtn('reset', ox + bw + gap, ay, bw, bh);
  } else if (sim.running) {
    // Running: [pause] [reset]
    const ox = TCX - bw - gap / 2;
    pauseBtn = drawBtn('pause',  ox,          ay, bw, bh);
    resetBtn  = drawBtn('reset', ox + bw + gap, ay, bw, bh);
  } else if (isPaused()) {
    // Paused: [resume] [step] [reset]
    const totalW = bw * 3 + gap * 2;
    const ox = TCX - totalW / 2;
    resumeBtn = drawBtn('resume', ox,              ay, bw, bh);
    stepBtn   = drawBtn('+1 mo',  ox + bw + gap,   ay, bw, bh);
    resetBtn  = drawBtn('reset',  ox + (bw + gap) * 2, ay, bw, bh);
  } else {
    // Done: [reset] centered
    resetBtn = drawBtn('reset', TCX - bw / 2, ay, bw, bh);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// DRAWING — LIVE READOUTS
// ═══════════════════════════════════════════════════════════════════════════
function drawRateBar(label, frac, x, y, barW, floorFrac) {
  const atFloorMark = floorFrac !== undefined && frac <= floorFrac + 0.01;
  const barCol = atFloorMark ? color(C_INT) : color(INK);

  fill(INK); noStroke();
  textFont('Courier New'); textSize(9); textAlign(RIGHT, CENTER);
  text(label, x - 4, y);

  // Track
  stroke(C_DIM); strokeWeight(1); noFill();
  rect(x, y - 4, barW, 8, 2);

  // Floor tick mark (floor mode only)
  if (floorFrac !== undefined) {
    const tickX = x + floorFrac * barW;
    stroke(C_INT); strokeWeight(1.5);
    line(tickX, y - 7, tickX, y + 7);
  }

  // Fill — turns red when at floor
  if (frac > 0.001) {
    fill(barCol); noStroke();
    rect(x + 1, y - 3, max(1, (barW - 2) * frac), 6, 1);
  }

  // Percentage
  fill(barCol); noStroke();
  textSize(9); textAlign(LEFT, CENTER);
  text(nf(round(frac * 100), 1) + '%', x + barW + 5, y);
}

function drawReadouts() {
  if (!sim.started) return;

  const liveIn  = sim.faucetMode === 'constant'
    ? 1.0
    : sim.level;  // fraction of max inflow currently flowing

  const liveOut = sim.mode === 'fixed'
    ? 1.0
    : sim.mode === 'proportional'
      ? sim.level
      : Math.max(sim.level, Math.min(1, sim.kFloor / sim.kOut));

  const rx = 72, ry = TB + 28, barW = 100;

  // Month counter
  fill(INK); noStroke();
  textFont('Courier New'); textSize(11); textAlign(LEFT, BASELINE);
  text('month ' + sim.months, rx - 45, ry - 8);

  // "now:" header frames the bars as live readouts
  fill(C_DIM); noStroke();
  textSize(9); textAlign(LEFT, BASELINE);
  text('now:', rx - 45, ry + 10);

  const floorMark = sim.mode === 'floor'
    ? Math.min(1, sim.kFloor / sim.kOut)
    : undefined;

  drawRateBar('inflow', liveIn,  rx, ry + 18, barW);
  drawRateBar('drain',  liveOut, rx, ry + 36, barW, floorMark);
}

// ═══════════════════════════════════════════════════════════════════════════
// DRAWING — OVERFLOW (game over)
// ═══════════════════════════════════════════════════════════════════════════
function drawOverflow() {
  const ox = TL + 14, oy = TT + TH * 0.18;
  const ow = TW - 28, oh = TH * 0.50;

  fill(245, 240, 232, 240); noStroke();
  rect(ox, oy, ow, oh, 6);

  fill(C_INT); noStroke();
  textFont('Courier New'); textAlign(CENTER, CENTER);
  textSize(16);
  text('GAME OVER', ox + ow / 2, oy + 30);

  fill(INK); textSize(10);
  text('the interest wins this round.', ox + ow / 2, oy + 54);

  textSize(9);
  text('in theory, this goes on forever —', ox + ow / 2, oy + 80);
  text('your debt grows faster than', ox + ow / 2, oy + 95);
  text('you can ever pay it down.', ox + ow / 2, oy + 110);
}

// ═══════════════════════════════════════════════════════════════════════════
// DRAWING — END SUMMARY
// ═══════════════════════════════════════════════════════════════════════════
function drawSummary() {
  const ox = TL + 14, oy = TT + TH * 0.22;
  const ow = TW - 28, oh = TH * 0.52;

  fill(245, 240, 232, 235); noStroke();
  rect(ox, oy, ow, oh, 6);

  fill(INK); noStroke();
  textFont('Courier New');
  textAlign(CENTER, CENTER); textSize(12);
  text('all drained!', ox + ow / 2, oy + 20);
  textSize(10);
  text(sim.months + ' months', ox + ow / 2, oy + 36);

  const total    = sim.initialBase + sim.totalIn;
  const baseFrac = total > 0 ? sim.initialBase / total : 1;
  const intFrac  = 1 - baseFrac;

  const barW = ow - 24, barH = 28;
  const bx = ox + 12, by = oy + 50;

  fill(C_BASE); noStroke();
  rect(bx, by, barW * baseFrac, barH, 3, 0, 0, 3);
  fill(C_INT);
  rect(bx + barW * baseFrac, by, barW * intFrac, barH, 0, 3, 3, 0);
  stroke(INK); strokeWeight(1); noFill();
  rect(bx, by, barW, barH, 3);

  fill(INK); noStroke(); textSize(10);
  textAlign(LEFT,  TOP); text(`original ${round(baseFrac * 100)}%`, bx, by + barH + 8);
  textAlign(RIGHT, TOP); text(`interest ${round(intFrac  * 100)}%`, bx + barW, by + barH + 8);
}

// ═══════════════════════════════════════════════════════════════════════════
// p5 LIFECYCLE
// ═══════════════════════════════════════════════════════════════════════════
function setup() {
  createCanvas(W, H);
  sim = makeSim();
}

function configActive() { return !sim.started; }
function isPaused()     { return sim.started && !sim.running && !sim.done; }

function draw() {
  background(BG);

  // Only update sim params from scrubbies during config (pre-run)
  if (configActive()) {
    sim.kIn  = scrubToK(scrubbies.faucet);
    sim.kOut = scrubToK(scrubbies.drain);
  }

  if (sim.running) {
    stepSim();
    stepParticles();
  }

  drawFaucetPipe();
  drawDrainPipe();
  drawTank();
  drawParticles();
  drawScrubbies();
  drawReadouts();
  drawControls();
  if (sim.done && sim.overflowed)  drawOverflow();
  if (sim.done && !sim.overflowed) drawSummary();
}

// ═══════════════════════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════════════════════
function inBtn(b) {
  return b._x !== undefined &&
    mouseX > b._x && mouseX < b._x + b._w &&
    mouseY > b._y && mouseY < b._y + b._h;
}

function inScrubby(s) {
  return s._x !== undefined &&
    mouseX > s._x && mouseX < s._x + s._w &&
    mouseY > s._y && mouseY < s._y + s._h;
}

function clampScrubVal(s, val) {
  val = constrain(val, s.min, s.max);
  if (s === scrubbies.drain && sim.mode === 'floor') {
    const floorVal = Math.ceil(map(sim.kFloor, s.kMin, s.kMax, s.min, s.max));
    val = Math.max(val, floorVal);
  }
  return val;
}

function mousePressed() {
  if (configActive()) {
    // Scrubby click (arrows) or grab (drag)
    for (const s of Object.values(scrubbies)) {
      if (inScrubby(s)) {
        const relX = mouseX - s._x;
        if (relX < 16) {
          s.val = clampScrubVal(s, s.val - 1);
        } else if (relX > s._w - 16) {
          s.val = clampScrubVal(s, s.val + 1);
        } else {
          scrubbing = s; scrubStartX = mouseX; scrubStartVal = s.val;
        }
        return;
      }
    }
    for (const btn of FAUCET_MODE_BTNS) {
      if (inBtn(btn)) { sim.faucetMode = btn.id; return; }
    }
    for (const btn of DRAIN_MODE_BTNS) {
      if (inBtn(btn)) { sim.mode = btn.id; return; }
    }
    if (inBtn(startBtn)) { sim.started = true; sim.running = true; return; }
  }

  // Running — pause
  if (sim.running && inBtn(pauseBtn)) { sim.running = false; return; }

  // Paused mid-sim — resume or step
  if (isPaused()) {
    if (inBtn(resumeBtn)) { sim.running = true; return; }
    if (inBtn(stepBtn))   { stepMonth(); return; }
  }

  // Reset always available — preserve mode selections and scrubby values
  if (inBtn(resetBtn)) {
    const prevFaucetMode = sim.faucetMode;
    const prevMode       = sim.mode;
    sim = makeSim();
    sim.faucetMode = prevFaucetMode;
    sim.mode       = prevMode;
    sim.kIn        = scrubToK(scrubbies.faucet);
    sim.kOut       = scrubToK(scrubbies.drain);
    fParts = []; dParts = [];
  }
}

function mouseDragged() {
  if (!scrubbing || !configActive()) return;
  const dx = mouseX - scrubStartX;
  scrubbing.val = clampScrubVal(scrubbing, round(scrubStartVal + dx / 10));
}

function mouseReleased() {
  scrubbing = null;
}
</script>
</body>
</html>
